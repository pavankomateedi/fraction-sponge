<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#5a3fc0">
  <title>Fraction Fruit Lab 🍎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Sound captions overlay (Deaf / hard-of-hearing accessibility) -->
<div class="captions" id="captions" aria-live="polite" aria-atomic="false" aria-label="Sound captions"></div>

<main class="app" role="main">

  <!-- ── Left panel: Chat / Tutor ── -->
  <section class="panel chat" aria-label="Tutor chat">
    <header class="chat-header">
      <div class="chat-logo" aria-hidden="true">🍎</div>
      <div class="chat-titles">
        <div class="chat-title">Fraction Fruit Lab</div>
        <div class="chat-sub">with Pip the seed</div>
      </div>
      <div class="header-toggles">
        <button
          class="hdr-toggle voice-toggle on"
          id="voiceToggle"
          type="button"
          aria-pressed="true"
          aria-label="Voice narration on — tap to turn off"
          title="Voice narration">
          <span class="toggle-glyph" aria-hidden="true">🔊</span>
        </button>
        <button
          class="hdr-toggle captions-toggle on"
          id="captionsToggle"
          type="button"
          aria-pressed="true"
          aria-label="Captions on — tap to turn off"
          title="Sound captions">
          <span class="toggle-glyph cc-label" aria-hidden="true">CC</span>
        </button>
      </div>
    </header>

    <div class="messages" id="messages" aria-live="polite" aria-atomic="false"></div>

    <div class="choices" id="choices" aria-label="Answer choices"></div>
  </section>

  <!-- ── Right panel: Manipulative workspace ── -->
  <section class="panel workspace" aria-label="Fraction workspace">
    <div class="flash-overlay" id="flashOverlay"></div>

    <header class="workspace-header">
      <div class="workspace-title">🍎 The Fruit Lab</div>
      <div class="workspace-tag">slice it · squish it · see it</div>
    </header>

    <div class="ref-bar-wrap">
      <div class="ref-bar-label">the whole bar</div>
      <div class="ref-bar" id="refBar"></div>
    </div>

    <div class="pieces-area" id="piecesArea"></div>

    <!-- 1/2 = 2/4 equation, revealed after smash -->
    <div class="equation" id="equation">
      <!-- Left: 1/2 apple mini -->
      <div class="eq-mini eq-mini-half" aria-hidden="true">
        <svg viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="miniHalfSkin" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ef5350"/>
              <stop offset="100%" stop-color="#c62828"/>
            </linearGradient>
          </defs>
          <rect x="56" y="2" width="6" height="9" rx="2" fill="#5d4037"/>
          <ellipse cx="72" cy="8" rx="9" ry="4" fill="#66bb6a" transform="rotate(20 72 8)"/>
          <path d="M 10 60 Q 10 14 60 14 Q 110 14 110 60 Z"
                fill="#FFF8E1" stroke="url(#miniHalfSkin)" stroke-width="6" stroke-linejoin="round"/>
          <ellipse cx="50" cy="40" rx="3" ry="4" fill="#3e2723" transform="rotate(-20 50 40)"/>
          <ellipse cx="70" cy="40" rx="3" ry="4" fill="#3e2723" transform="rotate(20 70 40)"/>
          <ellipse cx="60" cy="52" rx="3" ry="4" fill="#3e2723"/>
        </svg>
        <span class="eq-label">1/2</span>
      </div>

      <div class="eq-sign">=</div>

      <!-- Right: two 1/4 apple minis -->
      <div class="eq-rhs">
        <div class="eq-mini eq-mini-quarter" aria-hidden="true">
          <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="miniQA" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ef5350"/>
                <stop offset="100%" stop-color="#c62828"/>
              </linearGradient>
            </defs>
            <path d="M 60 60 L 8 60 A 56 56 0 0 1 60 8 Z"
                  fill="#FFF8E1" stroke="url(#miniQA)" stroke-width="5" stroke-linejoin="round"/>
            <ellipse cx="42" cy="46" rx="3" ry="4" fill="#3e2723" transform="rotate(-30 42 46)"/>
          </svg>
          <span class="eq-label">1/4</span>
        </div>
        <div class="eq-mini eq-mini-quarter" aria-hidden="true">
          <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="miniQB" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ef5350"/>
                <stop offset="100%" stop-color="#c62828"/>
              </linearGradient>
            </defs>
            <path d="M 10 60 L 10 8 A 56 56 0 0 1 62 60 Z"
                  fill="#FFF8E1" stroke="url(#miniQB)" stroke-width="5" stroke-linejoin="round"/>
            <ellipse cx="28" cy="46" rx="3" ry="4" fill="#3e2723" transform="rotate(30 28 46)"/>
          </svg>
          <span class="eq-label">1/4</span>
        </div>
      </div>
    </div>

    <div class="win-msg" id="winMsg" aria-live="assertive" role="status">
      <div class="win-badge">🏆  LESSON COMPLETE  🏆</div>
      <div class="win-big">1/2 🍎 = 2/4 🍎</div>
      <div class="win-sub">You discovered equivalent fractions!</div>
    </div>
  </section>

</main>

<script src="/manipulative.js"></script>
<script src="/tutorScript.js"></script>
<script src="/captions.js"></script>
<script src="/voice.js"></script>
<script src="/app.js"></script>
</body>
</html>
