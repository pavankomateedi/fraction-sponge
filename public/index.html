<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#5a3fc0">
  <title>Fraction Sponge 🧽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

  <!-- ── Left panel: Chat / Tutor ── -->
  <section class="panel chat" aria-label="Tutor chat">
    <header class="chat-header">
      <div class="chat-logo" aria-hidden="true">🧽</div>
      <div>
        <div class="chat-title">Fraction Sponge</div>
        <div class="chat-sub">with Pip</div>
      </div>
    </header>

    <div class="messages" id="messages" aria-live="polite" aria-atomic="false"></div>

    <div class="choices" id="choices" aria-label="Answer choices"></div>
  </section>

  <!-- ── Right panel: Manipulative workspace ── -->
  <section class="panel workspace" aria-label="Fraction workspace">
    <div class="flash-overlay" id="flashOverlay"></div>

    <header class="workspace-header">
      <div class="workspace-title">🧽 The Sponge Lab</div>
      <div class="workspace-tag">split it · smash it · see it</div>
    </header>

    <div class="ref-bar-wrap">
      <div class="ref-bar-label">the whole bar</div>
      <div class="ref-bar" id="refBar"></div>
    </div>

    <div class="pieces-area" id="piecesArea"></div>

    <div class="equation" id="equation">
      <div class="mini-block" style="width:110px;height:72px;background:linear-gradient(145deg,#FF6B35,#FF9A5C);">
        <div class="frac-display">
          <span class="frac-num" style="font-size:1.5rem">1</span>
          <div class="frac-bar-line" style="width:24px;margin:3px 0;"></div>
          <span class="frac-den" style="font-size:1.5rem">2</span>
        </div>
      </div>
      <div class="eq-sign">=</div>
      <div class="eq-rhs">
        <div class="mini-block" style="width:70px;height:72px;background:linear-gradient(145deg,#F7971E,#FFD200);">
          <div class="frac-display">
            <span class="frac-num" style="font-size:1.2rem">1</span>
            <div class="frac-bar-line" style="width:20px;margin:2px 0;"></div>
            <span class="frac-den" style="font-size:1.2rem">4</span>
          </div>
        </div>
        <div class="mini-block" style="width:70px;height:72px;background:linear-gradient(145deg,#f953c6,#b91d73);">
          <div class="frac-display">
            <span class="frac-num" style="font-size:1.2rem">1</span>
            <div class="frac-bar-line" style="width:20px;margin:2px 0;"></div>
            <span class="frac-den" style="font-size:1.2rem">4</span>
          </div>
        </div>
      </div>
    </div>

    <div class="win-msg" id="winMsg">
      <div class="win-big">1/2 = 2/4 🎉</div>
      <div class="win-sub">Equivalent Fractions!</div>
    </div>
  </section>

</div>

<script src="/manipulative.js"></script>
<script src="/tutorScript.js"></script>
<script src="/app.js"></script>
</body>
</html>
